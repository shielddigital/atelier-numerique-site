<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atelier Numérique</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:Inter, sans-serif;
  color:#fff;
  background:#05030a;
  overflow:hidden;
}

/* BACKGROUND WOW */
.bg{
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 70% 30%, rgba(168,85,247,0.35), transparent 40%),
    radial-gradient(circle at 30% 70%, rgba(168,85,247,0.2), transparent 40%),
    linear-gradient(180deg,#05030a,#0a0515);
  filter:blur(0px);
  z-index:-2;
}

.smoke{
  position:fixed;
  inset:0;
  background:radial-gradient(circle at 50% 50%, rgba(168,85,247,0.15), transparent 60%);
  filter:blur(80px);
  z-index:-1;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:80px 20px;
  text-align:center;
}

h1{
  font-size:clamp(3rem,8vw,6rem);
  font-weight:900;
  letter-spacing:-2px;
}

.gradient{
  background:linear-gradient(90deg,#fff,#a855f7);
  -webkit-background-clip:text;
  color:transparent;
}

.sub{
  margin-top:20px;
  color:rgba(255,255,255,0.7);
  font-size:1.2rem;
}

.card{
  margin-top:60px;
  padding:40px;
  border-radius:30px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 0 80px rgba(168,85,247,0.2);
}

.price{
  font-size:4rem;
  font-weight:900;
  margin-top:20px;
}

.btn{
  display:inline-block;
  margin-top:30px;
  padding:18px 28px;
  border-radius:14px;
  font-weight:800;
  background:linear-gradient(90deg,#a855f7,#7c3aed);
  box-shadow:0 10px 40px rgba(168,85,247,0.4);
}

.features{
  display:flex;
  justify-content:center;
  gap:30px;
  margin-top:40px;
  flex-wrap:wrap;
}

.feature{
  opacity:0.8;
}

footer{
  margin-top:80px;
  opacity:0.4;
}

</style>
</head>

<body>

<div class="bg"></div>
<div class="smoke"></div>

<div class="container">

<h1>
Je crée ton<br>
<span class="gradient">SITE INTERNET</span>
</h1>

<p class="sub">
Pro. Moderne. Efficace.
</p>

<div class="card">

<div class="price">499€</div>

<div class="features">
<div class="feature">Design premium</div>
<div class="feature">Responsive</div>
<div class="feature">SEO optimisé</div>
</div>

<a href="#" class="btn">DM moi</a>

</div>

<footer>
Atelier Numérique
</footer>

</div>

</body>
</html>
